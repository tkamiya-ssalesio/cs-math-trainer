<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CS Math Trainer | 情報I 計算トレーニング</title>
  <meta name="description" content="高校の情報の授業向けに作られた、進数変換やデータ量などの計算を練習するためのWebアプリです。">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-container">
    <!-- ヘッダー -->
    <header>
      <h1><span>CS</span> Math Trainer</h1>
      <p class="subtitle">情報I デジタル計算トレーニング</p>
    </header>

    <!-- =============== 1. メニュー画面 =============== -->
    <section id="menu-screen" class="screen active">
      <div class="menu-section">
        <h2 class="section-title">
          <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M8.5 5.6a.5.5 0 1 0-1 0v2.9h-3a.5.5 0 0 0 0 1h3V12.4a.5.5 0 1 0 1 0V9.5h3a.5.5 0 0 0 0-1h-3V5.6z"/><path d="M14 1a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1h12zM2 0a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V2a2 2 0 0 0-2-2H2z"/></svg>
          学習カテゴリの選択
        </h2>
        <div class="mode-grid" style="grid-template-columns: 1fr; gap: 1.2rem;">
          <button class="card-btn category-select-btn" data-category="bin-dec">
            <span class="card-title">2進法 ⇔ 10進法</span>
            <span class="card-desc">すだれ算による2進数への変換や、各桁の重み（2の累乗）を使った10進数への変換を学習します。</span>
          </button>
          <button class="card-btn category-select-btn" data-category="bin-hex">
            <span class="card-title">2進法 ⇔ 16進法</span>
            <span class="card-desc">4ビット区切りを用いた、2進数と16進数の手軽な変換方法を学習します。</span>
          </button>
          <button class="card-btn category-select-btn" data-category="dec-hex">
            <span class="card-title">10進法 ⇔ 16進法</span>
            <span class="card-desc">16で割るすだれ算や、各桁 of 重み（16の累乗）を用いた16進数から10進数への戻し方を学習します。</span>
          </button>
        </div>
      </div>
    </section>

    <!-- =============== 1.5 サブメニュー画面 =============== -->
    <section id="submenu-screen" class="screen">
      <h2 class="section-title" id="submenu-title" style="margin-bottom: 1.5rem; text-align: center; color: var(--accent-cyan); font-size: 1.5rem;">カテゴリタイトル</h2>

      <!-- アクション選択 -->
      <div class="menu-section">
        <h3 class="section-title" style="font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 0.6rem; text-transform: none; letter-spacing: 0.5px;">学習アクションの選択</h3>
        <div class="mode-grid" style="grid-template-columns: 1fr; gap: 1rem;">
          <button class="card-btn submenu-action-btn" data-action="learn" style="border-color: rgba(79, 172, 254, 0.15);">
            <span class="card-title" style="color: var(--accent-blue);">📘 変換方法の解説</span>
            <span class="card-desc">ステップごとのアニメーションで計算アルゴリズムを学びます。</span>
          </button>
          <button class="card-btn submenu-action-btn" data-action="play-a" style="border-color: rgba(57, 255, 20, 0.15);">
            <span class="card-title" id="play-a-title" style="color: var(--accent-green);">⚡️ A ➔ B のトレーニング</span>
            <span class="card-desc">ランダムに生成される問題に挑戦し、得点とコンボを競います。</span>
          </button>
          <button class="card-btn submenu-action-btn" data-action="play-b" style="border-color: rgba(57, 255, 20, 0.15);">
            <span class="card-title" id="play-b-title" style="color: var(--accent-green);">⚡️ B ➔ A のトレーニング</span>
            <span class="card-desc">逆方向の変換問題に挑戦し、計算スピードを鍛えます。</span>
          </button>
        </div>
      </div>

      <button id="submenu-back-btn" class="btn-secondary" style="width: 100%; margin-top: 2rem;">カテゴリ選択に戻る</button>
    </section>

    <!-- =============== 2. プレイ画面 =============== -->
    <section id="game-screen" class="screen">
      <!-- ゲーム上部ステータス -->
      <div class="game-header">
        <div class="timer-container">
          <div id="timer-bar" class="timer-bar"></div>
        </div>
        <div class="game-stats">
          <div class="stat-badge">
            <span id="game-progress-label" class="stat-label">問題:</span>
            <span id="question-progress" class="stat-value">1 / 10</span>
          </div>
          <div class="stat-badge">
            <span id="game-score-label" class="stat-label">スコア:</span>
            <span id="game-score" class="stat-value high">0</span>
          </div>
        </div>
      </div>

      <!-- 問題カード -->
      <div id="question-card" class="question-card">
        <div id="combo-display" class="combo-display">COMBO x0</div>
        <span id="question-mode-label" class="question-meta">2進数 ➔ 10進数</span>
        <span id="question-text" class="question-number">10110011</span>
      </div>

      <!-- 回答エリア -->
      <div class="input-section">
        <!-- ビットスイッチ (10進数→2進数で動的に表示) -->
        <div id="bit-input-area" class="bit-switches" style="display: none;">
          <!-- JSで動的にスイッチと重みを生成します -->
        </div>

        <!-- テキスト入力 -->
        <div id="text-input-area" class="input-wrapper">
          <input type="text" id="answer-input" class="text-input" placeholder="回答を入力..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
        </div>

        <!-- 操作ボタン -->
        <div class="game-controls">
          <button id="quit-btn" class="btn-secondary">終了</button>
          <button id="submit-btn" class="btn-primary" style="margin-top: 0;">決定</button>
        </div>
      </div>
    </section>

    <!-- =============== 3. リザルト画面 =============== -->
    <section id="result-screen" class="screen">
      <div class="result-card">
        <h2 class="section-title" id="result-title" style="text-align: center;">TRAINING COMPLETED</h2>
        <div id="result-score" class="score-hero">1,250</div>
        <p id="result-meta" style="text-align: center; margin-top: -0.8rem; margin-bottom: 1.2rem; font-size: 0.85rem; color: var(--text-secondary);">難易度: 中級 / ルール: 10問チャレンジ</p>
        <p class="subtitle" id="result-rank">素晴らしい！ 進数マスターの素質があります。</p>

        <div class="stats-grid">
          <div class="stat-item">
            <span class="stat-item-label">正答率</span>
            <span class="stat-item-value" id="result-accuracy">90%</span>
          </div>
          <div class="stat-item">
            <span class="stat-item-label">最大コンボ</span>
            <span class="stat-item-value" id="result-max-combo">5</span>
          </div>
        </div>

        <!-- 復習セクション -->
        <div class="review-section">
          <h3 class="review-title">間違えた問題</h3>
          <div id="review-list" class="review-list">
            <!-- JSで動的に間違えた問題が追加されます -->
          </div>
        </div>

        <button id="restart-btn" class="btn-primary">もう一度プレイ</button>
        <button id="back-to-menu-btn" class="btn-secondary" style="width: 100%; margin-top: 0.8rem;">メニューに戻る</button>
      </div>
    </section>

    <!-- =============== 4. 解説画面 =============== -->
    <section id="learn-screen" class="screen">
      <div class="learn-header">
        <h2 class="section-title" style="margin-bottom: 0.5rem;">進数変換の解説</h2>
        <!-- カテゴリタブ -->
        <div class="learn-tabs" style="display: flex; gap: 0.5rem; margin-bottom: 1rem; width: 100%;">
          <button class="diff-btn active" data-tab="bin-dec" style="font-size: 0.85rem; padding: 0.6rem;">10進数 ⇔ 2進数</button>
          <button class="diff-btn" data-tab="bin-hex" style="font-size: 0.85rem; padding: 0.6rem;">2進数 ⇔ 16進数</button>
          <button class="diff-btn" data-tab="dec-hex" style="font-size: 0.85rem; padding: 0.6rem;">10進数 ⇔ 16進数</button>
        </div>
      </div>

      <!-- 解説コンテンツ表示エリア -->
      <div class="learn-body" style="margin-bottom: 1.5rem;">
        <div id="tutorial-card" class="tutorial-card" style="background: rgba(255, 255, 255, 0.02); border: 1px solid var(--panel-border); border-radius: 20px; padding: 1.8rem; min-height: 380px; position: relative;">
          <!-- JSで動的に解説コンテンツとアニメーション要素を挿入 -->
        </div>
      </div>

      <!-- 操作パネル -->
      <div class="learn-footer">
        <div class="learn-controls" style="display: flex; gap: 0.8rem; justify-content: space-between; align-items: center;">
          <button id="learn-prev-btn" class="btn-secondary" style="flex: 1;">前へ</button>
          <div id="step-indicators" style="display: flex; gap: 0.4rem; justify-content: center; flex: 1;">
            <!-- JSでステップ数に応じたドットを生成 -->
          </div>
          <button id="learn-next-btn" class="btn-primary" style="flex: 1; margin-top: 0;">次へ</button>
        </div>
        <button id="learn-close-btn" class="btn-secondary" style="width: 100%; margin-top: 1rem;">メニューに戻る</button>
      </div>
    </section>
  </main>

  <!-- =============== 5. 難易度選択モーダル =============== -->
  <!-- =============== 5. トレーニング設定モーダル =============== -->
  <div id="settings-modal" class="modal-overlay">
    <div class="modal-content" style="max-width: 460px;">
      <h3 class="modal-title">トレーニング設定</h3>
      <p class="modal-desc">難易度とルールを選択して開始します。</p>

      <!-- 難易度選択 -->
      <div style="margin-bottom: 1.5rem;">
        <h4 style="text-align: left; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.6rem; font-weight: 600;">難易度の選択</h4>
        <div class="modal-difficulty-selector">
          <button class="modal-diff-tab-btn" data-diff="easy">初級<br><span style="font-size: 0.7rem; opacity: 0.8;">4-bit</span></button>
          <button class="modal-diff-tab-btn selected" data-diff="medium">中級<br><span style="font-size: 0.7rem; opacity: 0.8;">8-bit</span></button>
          <button class="modal-diff-tab-btn" data-diff="hard">上級<br><span style="font-size: 0.7rem; opacity: 0.8;">16-bit</span></button>
        </div>
      </div>

      <!-- ゲームモード選択 -->
      <div style="margin-bottom: 1.8rem;">
        <h4 style="text-align: left; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.6rem; font-weight: 600;">ルール（ゲームモード）の選択</h4>
        <div class="modal-mode-options">
          <button class="modal-mode-btn selected" data-mode="normal">
            <span class="mode-title">⚡️ 10問チャレンジ</span>
            <span class="mode-desc">1問15秒の制限時間で、全10問の正確さを競います。</span>
          </button>
          <button class="modal-mode-btn" data-mode="survival">
            <span class="mode-title">🔥 エンドレス・サバイバル</span>
            <span class="mode-desc">初期残り時間30秒。正解で時間回復、ミスで減少。時間切れまで挑戦！</span>
          </button>
          <button class="modal-mode-btn" data-mode="timeattack">
            <span class="mode-title">⏱️ タイムアタック</span>
            <span class="mode-desc">全10問を解ききるまでの合計タイムを競います（ミスは+3秒ペナルティ）。</span>
          </button>
        </div>
      </div>

      <div style="display: flex; gap: 0.8rem; margin-top: 1.5rem;">
        <button id="modal-cancel-btn" class="btn-secondary" style="flex: 1; margin-top: 0;">キャンセル</button>
        <button id="modal-start-btn" class="btn-primary" style="flex: 2; margin-top: 0;">スタート</button>
      </div>
    </div>
  </div>

  <script src="generators.js"></script>
  <script src="app.js"></script>
</body>
</html>
